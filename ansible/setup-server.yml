---
# Playbook: setup-server.yml
# Purpose: Configure a target machine to run the devops-app —
#          install Docker, Java, and prepare the environment.
# This mirrors exactly what you'd run against a real EC2 instance.

- name: Configure server for devops-app deployment
  hosts: local
  become: true   # Run tasks with sudo privileges

  vars:
    app_name: devops-app
    app_port: 8080
    java_version: 17

  tasks:

    # --- Step 1: Update package cache ---
    - name: Update apt package cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    # --- Step 2: Install prerequisite packages ---
    - name: Install prerequisite packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - apt-transport-https
        state: present

    # --- Step 3: Install Java (needed to run our Spring Boot JAR directly if not using Docker) ---
    - name: Install OpenJDK {{ java_version }}
      apt:
        name: "openjdk-{{ java_version }}-jdk"
        state: present

    - name: Verify Java installation
      command: java -version
      register: java_check
      changed_when: false

    - name: Show Java version
      debug:
        msg: "{{ java_check.stderr }}"

    # --- Step 4: Install Docker ---
    - name: Ensure keyrings directory exists
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Docker GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Install Docker Engine
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: true

    - name: Ensure Docker service is running and enabled
      service:
        name: docker
        state: started
        enabled: true

    # --- Step 5: Add current user to docker group (avoid needing sudo for docker commands) ---
    - name: Add user to docker group
      user:
        name: "{{ ansible_user_id }}"
        groups: docker
        append: true

    # --- Step 6: Create app directory ---
    - name: Create application directory
      file:
        path: "/opt/{{ app_name }}"
        state: directory
        mode: '0755'

    # --- Step 7: Create environment file for the app ---
    - name: Create app environment config file
      copy:
        dest: "/opt/{{ app_name }}/app.env"
        content: |
          APP_ENVIRONMENT=production
          APP_VERSION=1.0.0
          SERVER_PORT={{ app_port }}
        mode: '0644'

    # --- Step 8: Confirm everything is ready ---
    - name: Display setup completion message
      debug:
        msg: "Server is ready. Docker and Java {{ java_version }} installed. App directory at /opt/{{ app_name }}"
