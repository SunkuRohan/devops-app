name: CI/CD Pipeline - devops-app

on:
  workflow_dispatch:
    inputs:
      deploy_infra:
        description: 'Run terraform apply (provision/update AWS infra)?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      destroy_after:
        description: 'Run terraform destroy at the end (cleanup to save cost)?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: devops-app
  EKS_CLUSTER_NAME: devops-app-cluster

jobs:

  # ----------------------------------------------------------
  # Stage 1 — Build & Test
  # ----------------------------------------------------------
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set_tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and run tests
        run: ./gradlew clean build

      - name: Generate image tag (short SHA)
        id: set_tag
        run: echo "tag=$(echo ${GITHUB_SHA} | cut -c1-8)" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar

  # ----------------------------------------------------------
  # Stage 2 — Docker Build & Push to ECR
  # ----------------------------------------------------------
  docker-build-push:
    name: Docker Build & Push to ECR
    runs-on: ubuntu-latest
    needs: build-and-test
    outputs:
      ecr_repository_url: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ needs.build-and-test.outputs.image_tag }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  # ----------------------------------------------------------
  # Stage 3 — Terraform Apply (provision/update AWS infra)
  # ----------------------------------------------------------
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: ${{ inputs.deploy_infra == 'true' }}
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve

  # ----------------------------------------------------------
  # Stage 4 — Deploy to EKS
  # ----------------------------------------------------------
  deploy-to-eks:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [docker-build-push, terraform-apply]
    if: ${{ always() && inputs.deploy_infra == 'true' && needs.terraform-apply.result == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Update image tag in deployment manifest
        env:
          ECR_REPOSITORY_URL: ${{ needs.docker-build-push.outputs.ecr_repository_url }}
          IMAGE_TAG: ${{ needs.build-and-test.outputs.image_tag }}
        run: |
          sed -i "s|image:.*|image: ${ECR_REPOSITORY_URL}:${IMAGE_TAG}|" k8s/deployment.yaml
          cat k8s/deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Wait for rollout to complete
        run: kubectl rollout status deployment/devops-app --timeout=180s

      - name: Get Service URL
        id: get_url
        run: |
          for i in {1..15}; do
            URL=$(kubectl get svc devops-app-service -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
            if [ -n "$URL" ]; then
              echo "url=$URL" >> "$GITHUB_OUTPUT"
              break
            fi
            echo "Waiting for LoadBalancer hostname..."
            sleep 10
          done

      - name: Health check via Load Balancer
        run: |
          URL=${{ steps.get_url.outputs.url }}
          echo "Waiting for Load Balancer DNS propagation..."
          sleep 30
          for i in {1..10}; do
            if curl -sf "http://$URL/api/health"; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Retrying health check..."
            sleep 15
          done
          echo "Health check failed after retries"
          exit 1

  # ----------------------------------------------------------
  # Stage 5 — Optional cleanup (destroy infra to save cost)
  # ----------------------------------------------------------
  cleanup:
    name: Cleanup (Terraform Destroy)
    runs-on: ubuntu-latest
    needs: deploy-to-eks
    if: ${{ always() && inputs.destroy_after == 'true' && needs.deploy-to-eks.result == 'success' }}
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Delete Kubernetes Service (removes Load Balancer first)
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}
          kubectl delete -f ../k8s/service.yaml --ignore-not-found=true
          kubectl delete -f ../k8s/deployment.yaml --ignore-not-found=true

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
